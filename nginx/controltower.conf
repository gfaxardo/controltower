# Control Tower — Nginx: frontend (estático) + proxy API al backend
# Puertos: 80 (HTTP), 443 (HTTPS). Backend solo en 127.0.0.1:8000.
#
# Copiar a: /etc/nginx/sites-available/controltower.conf
# Activar: sudo ln -s /etc/nginx/sites-available/controltower.conf /etc/nginx/sites-enabled/
# Recargar: sudo nginx -t && sudo systemctl reload nginx
#
# Requisitos:
# - Frontend build en /var/www/controltower/frontend/dist
# - Backend escuchando en 127.0.0.1:8000 (run_server.py o systemd controltower-api.service)

# ——— HTTP (puerto 80) ———
server {
    listen 80;
    server_name 162.55.214.109 _;

    access_log /var/log/nginx/controltower_access.log;
    error_log  /var/log/nginx/controltower_error.log;

    root /var/www/controltower/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 360s;
        proxy_read_timeout 360s;
    }

    location ~ ^/(docs|redoc|openapi\.json|health) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}

