# =============================================================================
# Control Tower — copiar a: /etc/nginx/sites-available/controltower
# =============================================================================
#
# En el servidor (ajusta rutas si tu proyecto no está en /root/controltower):
#
#   sudo cp deploy/nginx-controltower.example.conf /etc/nginx/sites-available/controltower
#   sudo nano /etc/nginx/sites-available/controltower   # server_name, root, SSL si aplica
#
# Habilitar el sitio y recargar:
#
#   sudo ln -sf /etc/nginx/sites-available/controltower /etc/nginx/sites-enabled/controltower
#   sudo nginx -t && sudo systemctl reload nginx
#
# Si choca el puerto 80 con otro server { }, cambia server_name al dominio/IP real o
# desactiva el default: sudo rm /etc/nginx/sites-enabled/default (solo si sabes qué haces).
#
# Estáticos: tras `npm run build` en frontend/
#   sudo mkdir -p /var/www/controltower
#   sudo rsync -a --delete /root/controltower/frontend/dist/ /var/www/controltower/
#
# =============================================================================

server {
    listen 80;
    # listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/tu-dominio/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tu-dominio/privkey.pem;

    server_name 5.161.86.63;

    root /var/www/controltower;
    index index.html;

    access_log /var/log/nginx/controltower_access.log;
    error_log  /var/log/nginx/controltower_error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
