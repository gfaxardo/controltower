name: Control Tower CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify key packages
        run: |
          python -c "
          import importlib, sys
          pkgs = ['fastapi','uvicorn','pandas','sqlalchemy','alembic','pydantic','pydantic_settings','httpx','psycopg2','apscheduler']
          failed = []
          for pkg in pkgs:
              try:
                  importlib.import_module(pkg)
              except Exception as e:
                  failed.append(f'{pkg}: {e}')
          if failed:
              print('MISSING PACKAGES:')
              for f in failed:
                  print(f'  {f}')
              sys.exit(1)
          print('All key packages OK')
          "

      - name: Syntax check (compileall)
        run: python -m compileall -q .

      - name: Alembic migration chain validation
        run: |
          alembic history
        env:
          DATABASE_URL: postgresql://ci:dummy@localhost:5432/ci_db

      - name: Pytest (requires PostgreSQL — skipped in CI)
        if: false
        run: |
          echo "Pytest skipped: tests require a live PostgreSQL database."
          echo "Run locally: cd backend && pytest tests/ -v"

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
